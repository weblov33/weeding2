<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Приглашение на свадьбу Антона и Лизаветы</title>
    <meta
      name="description"
      content="Свадебное приглашение Антона и Лизаветы: дата, место, тайминг, дресс-код, пожелания и анкета гостя."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="story-shell" aria-label="Свадебное приглашение">
      <section class="poster-story" aria-label="Интерактивный маршрут по свадебному приглашению">
        <div class="story-camera">
          <div class="poster-map" role="img" aria-label="Приглашение на свадьбу Антона и Лизаветы">
            <img
              class="poster-image"
              src="assets/invitation.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            >
            <a
              class="qr-layer"
              href="https://pin.it/30qIQ0UK0"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть примеры дресс-кода"
            ></a>
            <a
              class="hotspot map"
              href="https://yandex.com/maps/org/lake_view_villa/16987605843?si=rnhya5djqjtj7vk3vrmm5xdqcm"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть Lake View Villa на Яндекс Картах"
            ></a>
            <a
              class="hotspot form"
              href="https://forms.gle/6pqeKxcycnhkAKJG7"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть анкету гостя"
            ></a>
          </div>
          <div class="scroll-hint" aria-hidden="true">
            <span>нажимайте “Дальше”</span>
            <i></i>
          </div>
          <div class="journey-cue" data-position="bottom" aria-hidden="true">
            <b>Маршрут приглашения</b>
            <span>нажимайте дальше</span>
          </div>
          <button class="step-control" data-position="bottom" data-variant="route" type="button" aria-live="polite">
            <span class="step-control__eyebrow">маршрут</span>
            <b>Дальше</b>
            <i aria-hidden="true"></i>
          </button>
          <div class="intro-gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
            <div class="confetti-field" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="intro-gate__panel">
              <p>Официальное приглашение</p>
              <h1 id="gate-title">Вас приглашают на свадьбу</h1>
              <strong>Антон и Лизавета · 18 сентября</strong>
              <span>
                Примите приглашение, а затем нажимайте “Дальше”:
                карта сама проведет вас по дате, месту, таймингу и важным деталям.
              </span>
              <button class="intro-gate__button" type="button">Принять приглашение</button>
            </div>
          </div>
        </div>
        <div class="story-spacer" aria-hidden="true"></div>
      </section>
    </main>

    <script>
      const POSTER = { width: 1080, height: 1920 };
      const steps = [
        {
          id: "overview",
          title: "Общий вид",
          cue: "Сначала вся карта целиком",
          cuePosition: "bottom",
          buttonPosition: "bottom",
          motion: "reveal",
          box: { x: 0, y: 0, width: 1080, height: 1920 },
          zoom: 1,
          fit: "contain",
        },
        {
          id: "intro",
          title: "Приветствие",
          cue: "начнем с главного",
          cuePosition: "bottom",
          buttonPosition: "bottom",
          motion: "float",
          box: { x: 55, y: 145, width: 355, height: 165 },
          zoom: 1.2,
          nudge: { y: -0.08 },
        },
        {
          id: "names",
          title: "Антон и Лизавета",
          cue: "знакомимся с героями дня",
          cuePosition: "bottom",
          buttonPosition: "bottom",
          motion: "arc",
          box: { x: 720, y: 30, width: 335, height: 310 },
          zoom: 1.1,
          nudge: { y: -0.06 },
        },
        {
          id: "place",
          title: "Место",
          cue: "ниже отмечена дата",
          cuePosition: "bottom",
          buttonPosition: "bottom",
          motion: "settle",
          box: { x: 145, y: 340, width: 300, height: 135 },
          zoom: 1.28,
          nudge: { y: -0.1 },
        },
        {
          id: "date",
          title: "18 сентября",
          cue: "дальше тайминг",
          cuePosition: "top",
          buttonPosition: "bottom",
          motion: "float",
          box: { x: 70, y: 555, width: 370, height: 270 },
          zoom: 1.15,
          nudge: { y: -0.08 },
        },
        {
          id: "timing",
          title: "Тайминг",
          cue: "дальше маленький личный блок",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "arc",
          box: { x: 220, y: 920, width: 380, height: 185 },
          zoom: 1.24,
          nudge: { y: 0.08 },
        },
        {
          id: "personal",
          title: "Личный блок",
          cue: "следом дресс-код",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "settle",
          box: { x: 585, y: 905, width: 275, height: 275 },
          zoom: 1.18,
          nudge: { y: 0.1 },
        },
        {
          id: "dress",
          title: "Дресс-код",
          cue: "дальше пожелания",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "float",
          box: { x: 250, y: 1245, width: 350, height: 330 },
          zoom: 1.08,
          nudge: { y: 0.06 },
        },
        {
          id: "gifts",
          title: "Подарки",
          cue: "еще ниже про цветы",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "arc",
          box: { x: 705, y: 1260, width: 330, height: 280 },
          zoom: 1.16,
          nudge: { y: 0.08 },
        },
        {
          id: "flowers",
          title: "Цветы",
          cue: "дальше анкета гостя",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "settle",
          box: { x: 775, y: 1545, width: 280, height: 245 },
          zoom: 1.18,
          nudge: { y: 0.1 },
        },
        {
          id: "form",
          title: "Анкета гостя",
          cue: "здесь можно открыть анкету",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "grand",
          box: { x: 300, y: 1660, width: 520, height: 170 },
          zoom: 1.1,
          minScale: 0.9,
          nudge: { y: 0.12 },
        },
        {
          id: "final",
          title: "До встречи",
          cue: "до встречи на празднике",
          cuePosition: "top",
          buttonPosition: "top",
          motion: "settle",
          box: { x: 210, y: 1780, width: 600, height: 115 },
          zoom: 1.18,
          minScale: 0.9,
          nudge: { y: 0.12 },
        },
        {
          id: "overviewEnd",
          title: "Общий вид",
          cue: "приглашение целиком",
          cuePosition: "bottom",
          buttonPosition: "bottom",
          motion: "grand",
          box: { x: 0, y: 0, width: 1080, height: 1920 },
          zoom: 1,
          fit: "contain",
        },
      ];

      const story = document.querySelector(".poster-story");
      const spacer = document.querySelector(".story-spacer");
      const camera = document.querySelector(".story-camera");
      const poster = document.querySelector(".poster-map");
      const scrollHint = document.querySelector(".scroll-hint");
      const introGate = document.querySelector(".intro-gate");
      const introButton = document.querySelector(".intro-gate__button");
      const journeyCue = document.querySelector(".journey-cue");
      const stepControl = document.querySelector(".step-control");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let targetFrame;
      let paintedFrame;
      let animationFrame = 0;
      let activeStepIndex = 0;
      let hasEntered = false;
      let transitionFromFrame;
      let transitionStartedAt = 0;
      let transitionDuration = 1250;
      let transitionEase = (value) => value;

      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }

      document.body.classList.add("story-is-gated");
      story.style.setProperty("--step-count", steps.length);
      spacer.innerHTML = steps.map(() => "<span></span>").join("");

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const mix = (from, to, progress) => from + (to - from) * progress;
      const easeInOutSine = (value) => 0.5 - Math.cos(Math.PI * value) / 2;
      const easeInOutCubic = (value) =>
        value < 0.5 ? 4 * value * value * value : 1 - Math.pow(-2 * value + 2, 3) / 2;
      const easings = {
        reveal: easeInOutCubic,
        float: easeInOutSine,
        arc: (value) => 1 - Math.pow(1 - value, 3),
        settle: (value) => 1 - Math.pow(1 - value, 4),
        grand: (value) => value < 0.5 ? 8 * value * value * value * value : 1 - Math.pow(-2 * value + 2, 4) / 2,
      };

      const getViewportSize = () => ({
        width: Math.round(window.visualViewport?.width || window.innerWidth || camera.clientWidth),
        height: Math.round(window.visualViewport?.height || window.innerHeight || camera.clientHeight),
      });

      const syncViewportHeight = () => {
        document.documentElement.style.setProperty("--viewport-height", `${getViewportSize().height}px`);
      };

      const getCameraForStep = (step) => {
        const { width: viewportWidth, height: viewportHeight } = getViewportSize();

        if (step.fit === "contain") {
          const scale = Math.min(viewportWidth / POSTER.width, viewportHeight / POSTER.height);

          return {
            scale,
            x: (viewportWidth - POSTER.width * scale) / 2,
            y: (viewportHeight - POSTER.height * scale) / 2,
          };
        }

        const safeWidth = viewportWidth - Math.min(52, viewportWidth * 0.1);
        const safeHeight = viewportHeight - Math.min(72, viewportHeight * 0.1);
        const coverScale = Math.max(viewportWidth / POSTER.width, viewportHeight / POSTER.height);
        const boxScale = Math.min(safeWidth / step.box.width, safeHeight / step.box.height) * step.zoom;
        const maxScale = viewportWidth >= 900 ? 1.5 : viewportWidth >= 640 ? 1.34 : 1.24;
        const scale = Math.max(coverScale, step.minScale || 0, Math.min(boxScale, maxScale));
        const scaledWidth = POSTER.width * scale;
        const scaledHeight = POSTER.height * scale;
        const boxCenterX = (step.box.x + step.box.width / 2) * scale;
        const boxCenterY = (step.box.y + step.box.height / 2) * scale;
        const minX = Math.min(0, viewportWidth - scaledWidth);
        const minY = Math.min(0, viewportHeight - scaledHeight);
        const nudgeX = (step.nudge?.x || 0) * viewportWidth;
        const nudgeY = (step.nudge?.y || 0) * viewportHeight;

        return {
          scale,
          x: clamp(viewportWidth / 2 - boxCenterX + nudgeX, minX, 0),
          y: clamp(viewportHeight / 2 - boxCenterY + nudgeY, minY, 0),
        };
      };

      const getProgress = () => {
        const rect = story.getBoundingClientRect();
        const distance = story.offsetHeight - getViewportSize().height;
        return distance > 0 ? clamp(-rect.top / distance, 0, 1) : 0;
      };

      const getScrollForStep = (stepIndex) => {
        const distance = story.offsetHeight - getViewportSize().height;
        const segmentCount = steps.length - 1;
        return Math.max(0, distance * clamp(stepIndex / segmentCount, 0, 1));
      };

      const getStoryState = (progress) => {
        const segmentCount = steps.length - 1;
        const raw = progress * segmentCount;
        const index = Math.min(Math.floor(raw), steps.length - 1);
        const local = raw - index;
        const holdEnd = 0.46;

        if (index >= steps.length - 1 || local <= holdEnd) {
          return {
            frame: getCameraForStep(steps[index]),
            activeIndex: index,
          };
        }

        const amount = easeInOutSine((local - holdEnd) / (1 - holdEnd));
        const current = getCameraForStep(steps[index]);
        const next = getCameraForStep(steps[index + 1]);

        return {
          frame: {
            scale: mix(current.scale, next.scale, amount),
            x: mix(current.x, next.x, amount),
            y: mix(current.y, next.y, amount),
          },
          activeIndex: amount < 0.55 ? index : index + 1,
        };
      };

      const applyFrame = (frame) => {
        poster.style.transform = `translate3d(${frame.x}px, ${frame.y}px, 0) scale(${frame.scale})`;
      };

      const draw = (timestamp = performance.now()) => {
        animationFrame = 0;

        if (!targetFrame) {
          return;
        }

        if (!paintedFrame || prefersReducedMotion) {
          paintedFrame = { ...targetFrame };
          applyFrame(paintedFrame);
          return;
        }

        if (transitionFromFrame) {
          const amount = transitionEase(clamp((timestamp - transitionStartedAt) / transitionDuration, 0, 1));

          paintedFrame = {
            x: mix(transitionFromFrame.x, targetFrame.x, amount),
            y: mix(transitionFromFrame.y, targetFrame.y, amount),
            scale: mix(transitionFromFrame.scale, targetFrame.scale, amount),
          };

          applyFrame(paintedFrame);

          if (amount < 1) {
            animationFrame = window.requestAnimationFrame(draw);
          } else {
            paintedFrame = { ...targetFrame };
            transitionFromFrame = null;
            stepControl.disabled = false;
          }

          return;
        }

        paintedFrame = {
          x: mix(paintedFrame.x, targetFrame.x, 0.12),
          y: mix(paintedFrame.y, targetFrame.y, 0.12),
          scale: mix(paintedFrame.scale, targetFrame.scale, 0.12),
        };

        const delta =
          Math.abs(paintedFrame.x - targetFrame.x) +
          Math.abs(paintedFrame.y - targetFrame.y) +
          Math.abs(paintedFrame.scale - targetFrame.scale) * 1000;

        if (delta < 0.28) {
          paintedFrame = { ...targetFrame };
        }

        applyFrame(paintedFrame);

        if (delta >= 0.28) {
          animationFrame = window.requestAnimationFrame(draw);
        }
      };

      const queueDraw = () => {
        if (!animationFrame) {
          animationFrame = window.requestAnimationFrame(draw);
        }
      };

      const updateCue = (index) => {
        activeStepIndex = index;
        const step = steps[index];
        journeyCue.dataset.position = step.cuePosition || "bottom";
        stepControl.dataset.position = step.buttonPosition || "bottom";
        stepControl.dataset.variant = step.motion || "route";
        journeyCue.querySelector("b").textContent = step.title;
        journeyCue.querySelector("span").textContent = step.cue;

        const isLast = index === steps.length - 1;
        const nextStep = steps[isLast ? 1 : index + 1];
        stepControl.querySelector(".step-control__eyebrow").textContent = isLast
          ? "маршрут завершен"
          : `далее: ${nextStep.title}`;
        stepControl.querySelector("b").textContent = isLast ? "Пройти снова" : index === 0 ? "Начать маршрут" : "Дальше";

        journeyCue.classList.toggle("is-visible", hasEntered);
        stepControl.classList.toggle("is-visible", hasEntered);
        scrollHint.classList.add("is-hidden");
      };

      const setStep = (index, options = {}) => {
        const nextIndex = clamp(index, 0, steps.length - 1);
        const nextFrame = getCameraForStep(steps[nextIndex]);

        activeStepIndex = nextIndex;
        targetFrame = nextFrame;
        updateCue(nextIndex);

        if (!options.animate || prefersReducedMotion || !paintedFrame) {
          transitionFromFrame = null;
          paintedFrame = { ...nextFrame };
          stepControl.disabled = false;
          applyFrame(paintedFrame);
          return;
        }

        transitionFromFrame = { ...paintedFrame };
        transitionStartedAt = performance.now();
        transitionDuration =
          options.duration ||
          (steps[nextIndex].motion === "grand" ? 1680 : Math.abs(nextFrame.scale - transitionFromFrame.scale) > 0.8 ? 1450 : 1220);
        transitionEase = easings[steps[nextIndex].motion] || easeInOutCubic;
        stepControl.disabled = true;
        queueDraw();
      };

      const goToNextStep = () => {
        const nextIndex = activeStepIndex >= steps.length - 1 ? 1 : activeStepIndex + 1;
        setStep(nextIndex, { animate: true });
      };

      const enterStory = () => {
        hasEntered = true;
        document.body.classList.remove("story-is-gated");
        document.body.classList.add("story-has-entered");
        introGate.setAttribute("aria-hidden", "true");
        introButton.disabled = true;
        setStep(0, { animate: false });
      };

      const render = () => {
        syncViewportHeight();

        setStep(activeStepIndex, { animate: false });
      };

      introButton.addEventListener("click", enterStory);
      stepControl.addEventListener("click", goToNextStep);
      window.addEventListener(
        "keydown",
        (event) => {
          if (!hasEntered && (event.key === "Enter" || event.key === " ")) {
            event.preventDefault();
            enterStory();
          } else if (hasEntered && (event.key === "Enter" || event.key === " ")) {
            event.preventDefault();
            goToNextStep();
          }
        },
        { passive: false },
      );

      window.addEventListener("resize", render);
      window.visualViewport?.addEventListener("resize", () => {
        paintedFrame = null;
        render();
      });
      window.addEventListener("pageshow", () => {
        paintedFrame = null;
        render();
      });
      render();
    </script>
  </body>
</html>
