<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Приглашение на свадьбу Антона и Лизаветы</title>
    <meta
      name="description"
      content="Свадебное приглашение Антона и Лизаветы: дата, место, тайминг, дресс-код, пожелания и анкета гостя."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell" aria-label="Свадебное приглашение">
      <section class="guided-invite" aria-label="Маршрут по свадебному приглашению">
        <div class="camera">
          <div class="invitation" role="img" aria-label="Приглашение на свадьбу Антона и Лизаветы">
            <img
              class="invite-art"
              src="assets/invitation.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            >
            <a
              class="qr-layer"
              href="https://pin.it/30qIQ0UK0"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть примеры дресс-кода"
            ></a>
            <a
              class="hotspot map"
              href="https://yandex.com/maps/org/lake_view_villa/16987605843?si=rnhya5djqjtj7vk3vrmm5xdqcm"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть Lake View Villa на Яндекс Картах"
            ></a>
            <a
              class="hotspot form"
              href="https://forms.gle/6pqeKxcycnhkAKJG7"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть анкету гостя"
            ></a>
          </div>
        </div>
        <div class="chapters" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>
    <script>
      const source = { width: 1080, height: 1920 };
      const frames = [
        { box: { x: 20, y: 20, width: 760, height: 560 } },
        { box: { x: 85, y: 270, width: 500, height: 320 } },
        { box: { x: 30, y: 610, width: 560, height: 430 } },
        { box: { x: 105, y: 910, width: 850, height: 380 } },
        { box: { x: 20, y: 1170, width: 680, height: 430 } },
        { box: { x: 545, y: 1180, width: 500, height: 430 } },
        { box: { x: 185, y: 1515, width: 760, height: 385 } },
      ];

      const page = document.querySelector(".guided-invite");
      const camera = document.querySelector(".camera");
      const invitation = document.querySelector(".invitation");

      page.style.setProperty("--frame-count", frames.length + 1);

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const mix = (from, to, amount) => from + (to - from) * amount;
      const ease = (value) => value * value * (3 - 2 * value);
      let lastState = "";

      const getTarget = (frame) => {
        const cameraWidth = camera.clientWidth;
        const cameraHeight = camera.clientHeight;
        const pad = clamp(cameraWidth * 0.08, 22, 42);
        const box = frame.box;
        const coverScale = Math.max(cameraWidth / source.width, cameraHeight / source.height);
        const fitBoxScale = Math.min(
          (cameraWidth - pad * 2) / box.width,
          (cameraHeight - pad * 2) / box.height
        );
        const scale = Math.max(coverScale, fitBoxScale);
        const scaledWidth = source.width * scale;
        const scaledHeight = source.height * scale;
        const boxCenterX = (box.x + box.width / 2) * scale;
        const boxCenterY = (box.y + box.height / 2) * scale;
        const minX = Math.min(0, cameraWidth - scaledWidth);
        const minY = Math.min(0, cameraHeight - scaledHeight);

        return {
          scale,
          x: clamp(cameraWidth / 2 - boxCenterX, minX, 0),
          y: clamp(cameraHeight / 2 - boxCenterY, minY, 0),
        };
      };

      const getFrame = (progress) => {
        const position = progress * (frames.length - 1);
        const index = Math.min(Math.floor(position), frames.length - 2);
        const amount = ease(position - index);
        const current = getTarget(frames[index]);
        const next = getTarget(frames[index + 1]);

        return {
          scale: mix(current.scale, next.scale, amount),
          x: mix(current.x, next.x, amount),
          y: mix(current.y, next.y, amount),
        };
      };

      const render = () => {
        const pageRect = page.getBoundingClientRect();
        const distance = pageRect.height - window.innerHeight;
        const progress = clamp(-pageRect.top / distance, 0, 1);
        const frame = getFrame(progress);

        invitation.style.transform = `translate3d(${frame.x}px, ${frame.y}px, 0) scale(${frame.scale})`;
      };

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        page.style.setProperty("--frame-count", 1);
        invitation.style.transform = `translate3d(0, 0, 0) scale(${Math.max(
          window.innerWidth / source.width,
          window.innerHeight / source.height
        )})`;
      } else {
        const syncRender = () => {
          const state = `${window.scrollY}:${camera.clientWidth}:${camera.clientHeight}`;

          if (state !== lastState) {
            lastState = state;
            render();
          }
        };

        window.addEventListener("scroll", syncRender, { passive: true });
        document.addEventListener("scroll", syncRender, { passive: true });
        window.visualViewport?.addEventListener("resize", syncRender);
        window.addEventListener("resize", syncRender);
        window.setInterval(syncRender, 120);
        render();
      }
    </script>
  </body>
</html>
