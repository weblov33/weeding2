<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Приглашение на свадьбу Антона и Лизаветы</title>
    <meta
      name="description"
      content="Свадебное приглашение Антона и Лизаветы: дата, место, тайминг, дресс-код, пожелания и анкета гостя."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell" aria-label="Свадебное приглашение">
      <section class="guided-invite" aria-label="Маршрут по свадебному приглашению">
        <div class="camera">
          <div class="invitation" role="img" aria-label="Приглашение на свадьбу Антона и Лизаветы">
            <span class="invite-art" aria-hidden="true"></span>
            <a
              class="qr-layer"
              href="https://pin.it/30qIQ0UK0"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть примеры дресс-кода"
            ></a>
            <a
              class="hotspot map"
              href="https://yandex.com/maps/org/lake_view_villa/16987605843?si=rnhya5djqjtj7vk3vrmm5xdqcm"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть Lake View Villa на Яндекс Картах"
            ></a>
            <a
              class="hotspot form"
              href="https://forms.gle/6pqeKxcycnhkAKJG7"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть анкету гостя"
            ></a>
          </div>
          <div class="progress-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="scroll-cue" aria-hidden="true"></span>
        </div>
      </section>
    </main>
    <script>
      const frames = [
        { x: 0.5, y: 0.2, zoom: 1 },
        { x: 0.3, y: 0.22, zoom: 1.25 },
        { x: 0.28, y: 0.36, zoom: 1.24 },
        { x: 0.54, y: 0.52, zoom: 1.2 },
        { x: 0.24, y: 0.66, zoom: 1.22 },
        { x: 0.46, y: 0.86, zoom: 1.2 },
        { x: 0.5, y: 0.5, zoom: 1 },
      ];

      const page = document.querySelector(".guided-invite");
      const camera = document.querySelector(".camera");
      const invitation = document.querySelector(".invitation");
      const dots = document.querySelectorAll(".progress-dots span");

      page.style.setProperty("--frame-count", frames.length);

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      const mix = (from, to, amount) => from + (to - from) * amount;
      const ease = (value) => value * value * (3 - 2 * value);
      let ticking = false;

      const getFrame = (progress) => {
        const position = progress * (frames.length - 1);
        const index = Math.min(Math.floor(position), frames.length - 2);
        const amount = ease(position - index);
        const current = frames[index];
        const next = frames[index + 1];

        return {
          active: Math.round(position),
          x: mix(current.x, next.x, amount),
          y: mix(current.y, next.y, amount),
          zoom: mix(current.zoom, next.zoom, amount),
        };
      };

      const render = () => {
        const pageRect = page.getBoundingClientRect();
        const scrollDistance = pageRect.height - window.innerHeight;
        const progress = clamp(-pageRect.top / scrollDistance, 0, 1);
        const frame = getFrame(progress);
        const cameraWidth = camera.clientWidth;
        const cameraHeight = camera.clientHeight;
        const width = invitation.offsetWidth;
        const height = invitation.offsetHeight;
        const zoom = frame.zoom;
        const scaledWidth = width * zoom;
        const scaledHeight = height * zoom;
        const minX = Math.min(0, cameraWidth - scaledWidth);
        const minY = Math.min(0, cameraHeight - scaledHeight);
        const x = clamp(cameraWidth / 2 - scaledWidth * frame.x, minX, 0);
        const y = clamp(cameraHeight / 2 - scaledHeight * frame.y, minY, 0);

        invitation.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${zoom})`;
        dots.forEach((dot, index) => {
          dot.classList.toggle("is-active", index === frame.active);
        });
        camera.classList.toggle("is-finished", progress > 0.97);
        ticking = false;
      };

      const requestRender = () => {
        if (!ticking) {
          window.requestAnimationFrame(render);
          ticking = true;
        }
      };

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        page.style.setProperty("--frame-count", 1);
        invitation.style.transform = "";
        dots[dots.length - 1]?.classList.add("is-active");
      } else {
        window.addEventListener("scroll", requestRender, { passive: true });
        window.addEventListener("resize", requestRender);
        render();
      }
    </script>
  </body>
</html>
