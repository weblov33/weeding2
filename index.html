<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Приглашение на свадьбу Антона и Лизаветы</title>
    <meta
      name="description"
      content="Свадебное приглашение Антона и Лизаветы: дата, место, тайминг, дресс-код, пожелания и анкета гостя."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell" aria-label="Свадебное приглашение">
      <section class="guided-invite" aria-label="Маршрут по свадебному приглашению">
        <div class="camera">
          <div class="invitation" role="img" aria-label="Приглашение на свадьбу Антона и Лизаветы">
            <img
              class="invite-art"
              src="assets/invitation.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            >
            <a
              class="qr-layer"
              href="https://pin.it/30qIQ0UK0"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть примеры дресс-кода"
            ></a>
            <a
              class="hotspot map"
              href="https://yandex.com/maps/org/lake_view_villa/16987605843?si=rnhya5djqjtj7vk3vrmm5xdqcm"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть Lake View Villa на Яндекс Картах"
            ></a>
            <a
              class="hotspot form"
              href="https://forms.gle/6pqeKxcycnhkAKJG7"
              target="_blank"
              rel="noreferrer"
              aria-label="Открыть анкету гостя"
            ></a>
          </div>
          <div class="step-label" aria-hidden="true">Начало</div>
          <div class="progress-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="scroll-cue" aria-hidden="true"></span>
        </div>
        <div class="chapters" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </main>
    <script>
      const frames = [
        { label: "Начало", x: 0.5, y: 0.2, zoom: 1 },
        { label: "Место", x: 0.26, y: 0.22, zoom: 2.25 },
        { label: "Дата", x: 0.25, y: 0.39, zoom: 2.05 },
        { label: "Тайминг", x: 0.47, y: 0.55, zoom: 1.9 },
        { label: "Дресс-код", x: 0.24, y: 0.72, zoom: 2.02 },
        { label: "Анкета", x: 0.47, y: 0.9, zoom: 1.9 },
        { label: "Финал", x: 0.5, y: 0.52, zoom: 1.08 },
      ];

      const page = document.querySelector(".guided-invite");
      const camera = document.querySelector(".camera");
      const invitation = document.querySelector(".invitation");
      const stepLabel = document.querySelector(".step-label");
      const dots = document.querySelectorAll(".progress-dots span");

      page.style.setProperty("--frame-count", frames.length + 1);

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
      let ticking = false;
      let activeFrame = -1;

      const applyFrame = (index) => {
        const frame = frames[index];
        const cameraWidth = camera.clientWidth;
        const cameraHeight = camera.clientHeight;
        const fitScale = Math.max(cameraWidth / 1080, cameraHeight / 1920);
        const scale = fitScale * frame.zoom;
        const scaledWidth = 1080 * scale;
        const scaledHeight = 1920 * scale;
        const minX = Math.min(0, cameraWidth - scaledWidth);
        const minY = Math.min(0, cameraHeight - scaledHeight);
        const x = clamp(cameraWidth * 0.5 - scaledWidth * frame.x, minX, 0);
        const y = clamp(cameraHeight * 0.5 - scaledHeight * frame.y, minY, 0);

        invitation.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
        stepLabel.textContent = frame.label;
        dots.forEach((dot, index) => {
          dot.classList.toggle("is-active", index === activeFrame);
        });
        camera.classList.toggle("is-finished", index === frames.length - 1);
      };

      const render = () => {
        const pageTop = page.offsetTop;
        const stepHeight = window.innerHeight;
        const rawStep = (window.scrollY - pageTop + stepHeight * 0.42) / stepHeight;
        const nextFrame = clamp(Math.floor(rawStep), 0, frames.length - 1);

        if (nextFrame !== activeFrame) {
          activeFrame = nextFrame;
          applyFrame(activeFrame);
        }

        ticking = false;
      };

      const requestRender = () => {
        if (!ticking) {
          window.requestAnimationFrame(render);
          ticking = true;
        }
      };

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        page.style.setProperty("--frame-count", 1);
        invitation.style.transform = "";
        stepLabel.textContent = "Приглашение";
        dots[dots.length - 1]?.classList.add("is-active");
      } else {
        window.addEventListener("scroll", requestRender, { passive: true });
        window.addEventListener("resize", () => {
          activeFrame = -1;
          requestRender();
        });
        render();
      }
    </script>
  </body>
</html>
